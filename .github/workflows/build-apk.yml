name: Build & Release APK

on:
  push:
    tags:
      - 'v*'           # trigger on version tags like v1.0.0
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Upgrade lucide_icons to Flutter-compatible version
        run: flutter pub upgrade lucide_icons

      - name: Patch lucide_icons if IconData is final
        run: |
          FILE=$(find $HOME/.pub-cache -path "*/lucide_icons*/lib/src/icon_data.dart" | head -1)
          if [ -n "$FILE" ] && grep -q "extends IconData" "$FILE"; then
            echo "Patching lucide_icons IconData (Flutter final class workaround)"
            cat > "$FILE" << 'PATCH'
          import 'package:flutter/widgets.dart';

          class LucideIconData implements IconData {
            const LucideIconData(this.codePoint)
                : fontFamily = 'LucideIcons',
                  fontPackage = 'lucide_icons',
                  matchTextDirection = false;

            @override
            final int codePoint;
            @override
            final String? fontFamily;
            @override
            final String? fontPackage;
            @override
            final bool matchTextDirection;
          }
          PATCH
            echo "Patch applied."
          else
            echo "No patch needed."
          fi

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs with version
        run: |
          VERSION="${{ github.ref_name }}"
          # fallback to commit SHA if not a tag
          if [[ "$VERSION" != v* ]]; then
            VERSION="build-${{ github.run_number }}"
          fi
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            mv "$f" "unzolo-crm-${VERSION}-${f#app-}"
          done

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: unzolo-crm-apk
          path: build/app/outputs/flutter-apk/unzolo-crm-*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Unzolo CRM ${{ github.ref_name }}
          body: |
            ## Unzolo CRM ${{ github.ref_name }}

            ### Download
            Pick the APK for your device architecture:
            - **arm64-v8a** — most modern phones (64-bit)
            - **armeabi-v7a** — older/32-bit phones
            - **x86_64** — emulators
          files: build/app/outputs/flutter-apk/unzolo-crm-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
