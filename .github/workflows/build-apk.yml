name: Build & Release APK

on:
  push:
    tags:
      - 'v*'           # trigger on version tags like v1.0.0
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # Flutter 3.44.5 made IconData a final class so lucide_icons can't extend it.
      # Patch: replace every LucideIconData(0xNNNN) call with an inline IconData(...)
      # and stub out the icon_data.dart file so nothing tries to define the class.
      - name: Patch lucide_icons for Flutter 3.44.5 compatibility
        run: |
          LUCIDE_DIR=$(find "$HOME/.pub-cache" -type d -name "lucide_icons-*" | head -1)
          if [ -z "$LUCIDE_DIR" ]; then
            echo "lucide_icons not found in pub cache, skipping patch"
            exit 0
          fi
          echo "Patching $LUCIDE_DIR"

          # Replace every: = LucideIconData(0xABCD)
          # With:          = IconData(0xABCD, fontFamily: 'LucideIcons', fontPackage: 'lucide_icons')
          find "$LUCIDE_DIR" -name "*.dart" -exec \
            sed -i "s/LucideIconData(0x\([0-9a-fA-F]*\))/IconData(0x\1, fontFamily: 'LucideIcons', fontPackage: 'lucide_icons')/g" {} \;

          # Stub out icon_data.dart — the class is no longer needed
          cat > "$LUCIDE_DIR/lib/src/icon_data.dart" << 'EOF'
          // Patched for Flutter 3.44.5: IconData is final, LucideIconData removed.
          // All icon constants now use IconData(...) directly.
          EOF

          echo "Patch complete"

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs with version
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != v* ]]; then
            VERSION="build-${{ github.run_number }}"
          fi
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            mv "$f" "unzolo-crm-${VERSION}-${f#app-}"
          done

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: unzolo-crm-apk
          path: build/app/outputs/flutter-apk/unzolo-crm-*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Unzolo CRM ${{ github.ref_name }}
          body: |
            ## Unzolo CRM ${{ github.ref_name }}

            ### Download
            Pick the APK for your device architecture:
            - **arm64-v8a** — most modern phones (64-bit)
            - **armeabi-v7a** — older/32-bit phones
            - **x86_64** — emulators
          files: build/app/outputs/flutter-apk/unzolo-crm-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
